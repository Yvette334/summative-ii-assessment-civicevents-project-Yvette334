<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="md:h-screen">
        <div class="flex items-center lg:p-12 p-8 bg-[#0C172C] h-full lg:w-11/12 lg:ml-auto">
          <form id="signupForm" class="max-w-lg w-full mx-auto">
            <div class="mb-12">
              <h1 class="text-3xl text-center font-semibold text-purple-400">Create an account</h1>
            </div>
            <div>
              <label class="text-white text-xs block mb-2">Full Name</label>
              <div class="relative flex items-center">
                <input name="name" type="text" required class="w-full bg-transparent text-sm text-white border-b border-slate-500 focus:border-white pl-2 pr-8 py-3 outline-none" placeholder="Enter name" />
              </div>
            </div>
            <div class="mt-8">
              <label class="text-white text-xs block mb-2">Email</label>
              <div class="relative flex items-center">
                <input name="email" type="text" required class="w-full bg-transparent text-sm text-white border-b border-slate-500 focus:border-white pl-2 pr-8 py-3 outline-none" placeholder="Enter email" />
              </div>
            </div>
            <div class="mt-8">
              <label class="text-white text-sm font-medium mb-2 block">Password</label>
              <input name="password" type="password" class="text-slate-900 bg-white border border-gray-300 w-full text-sm px-4 py-3 rounded-md outline-blue-500" placeholder="Enter password" />
              <div class="mt-2 h-1 w-full bg-slate-700 rounded-full overflow-hidden">
                <div id="strengthBar" class="h-full w-0 transition-all duration-300 bg-slate-500"></div>
            </div>
            <p id="strengthText" class="text-[10px] text-slate-400 mt-1 uppercase tracking-wider">Strength: None</p>
            </div>
            <div class="mt-8">
              <label class="text-white text-sm font-medium mb-2 block">Confirm Password</label>
              <input  name="cpassword" id="cpassword" type="password" class="text-slate-900 bg-white border border-gray-300 w-full text-sm px-4 py-3 rounded-md outline-blue-500" placeholder="Enter confirm password" />
            </div>
            <div class="mt-8">
              <button type="submit" class="w-max text-center shadow-xl py-3 px-6 min-w-32 text-sm text-white font-medium rounded-sm bg-purple-600 hover:bg-purple-500 focus:outline-none cursor-pointer">
                Register
              </button>
              <p class="text-sm text-slate-300 mt-8">Already have an account? <a href="./login.html" class="text-purple-400 font-medium hover:underline ml-1">Login here</a></p>
            </div>
          </form>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        $(document).ready(function(){
            $('input[name="password"]').first().attr('id', 'password');
            $('#password').on('input', function() {
                let pass = $(this).val();
                let score = 0;

                if (pass.length >= 8) score++;                   
                if (/[A-Z]/.test(pass) && /[a-z]/.test(pass)) score++;
                if (/[0-9]/.test(pass)) score++;              
                if (/[^A-Za-z0-9]/.test(pass)) score++;      


                const widths = ['0%', '25%', '50%', '75%', '100%'];
                const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-blue-500', 'bg-green-500'];
                const texts  = ['None', 'Weak', 'Fair', 'Strong', 'Very Strong'];

                $('#strengthBar').css('width', widths[score]).removeClass().addClass('h-full transition-all ' + colors[score]);
                $('#strengthText').text('Strength: ' + texts[score]);
            });

            $('#signupForm').on('submit', function(e) {
                e.preventDefault();
                const pass = $('#password').val();
                const cpass = $('#cpassword').val();
                
                if (pass !== cpass) {
                    alert("Passwords do not match!");
                    return;
                }

                const data = {
                    full_name: $('input[name="name"]').val(),
                    email: $('input[name="email"]').val(),
                    password: pass,
                    role: "user"
                };

                Api.call('/api/auth/signup', 'POST', data)
                    .done((res) => {
                       alert("Signup Success");
                       window.location.href = 'login.html'; })
                    .fail(function(err){
                      alert(err.responseJSON?.message || "Signup failed")
            });
            });
        });
    </Script>
</body>
</html>
