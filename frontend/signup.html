<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - CivicEvents+</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen text-slate-800 font-sans">

  <main class="flex-grow flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <section class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-xl border border-teal-100">
      <div>
        <h2 class="mt-2 text-center text-3xl font-extrabold text-teal-950">Create an Account</h2>
        <p class="mt-2 text-center text-sm text-slate-600">Join CivicEvents to discover the city</p>
      </div>

      <form id="signupForm" class="mt-8 space-y-6" action="#" method="POST">
        <div class="rounded-md shadow-sm space-y-4">
          <div>
            <label for="name" class="block text-sm font-medium text-slate-700">Full Name</label>
            <input id="name" name="name" type="text" required
              class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-500 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 focus:z-10 sm:text-sm"
              placeholder="John Doe">
          </div>
          <div>
            <label for="email" class="block text-sm font-medium text-slate-700">Email address</label>
            <input id="email" name="email" type="email" required
              class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-500 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 focus:z-10 sm:text-sm"
              placeholder="Email address">
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
            <input id="password" name="password" type="password" required
              class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-500 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 focus:z-10 sm:text-sm"
              placeholder="Password">

            <!-- Password Strength -->
            <div class="mt-2 h-1 w-full bg-slate-200 rounded-full overflow-hidden">
              <div id="strengthBar" class="h-full w-0 transition-all duration-300 bg-slate-300"></div>
            </div>
            <p id="strengthText" class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider font-bold">Strength:
              None</p>
            <ul id="passwordRequirements" class="text-xs text-slate-500 mt-2 list-disc pl-4 space-y-1">
              <li id="req-length" class="text-red-500">Min 8 characters</li>
              <li id="req-case" class="text-red-500">Mixed case (a-z, A-Z)</li>
              <li id="req-num" class="text-red-500">At least 1 number</li>
              <li id="req-spec" class="text-red-500">Special character (!@#$)</li>
            </ul>
          </div>
          <div>
            <label for="cpassword" class="block text-sm font-medium text-slate-700">Confirm Password</label>
            <input id="cpassword" name="cpassword" type="password" required
              class="mt-1 appearance-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-500 text-slate-900 rounded-md focus:outline-none focus:ring-teal-500 focus:border-teal-500 focus:z-10 sm:text-sm"
              placeholder="Confirm Password">
          </div>
        </div>

        <div>
          <button type="submit" id="submitBtn" disabled
            class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-teal-700 hover:bg-teal-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors shadow-md disabled:bg-slate-400 disabled:cursor-not-allowed">
            Register
          </button>
        </div>
      </form>

      <p class="mt-4 text-center text-sm text-slate-600">
        Already have an account?
        <a href="login.html" class="font-semibold text-teal-600 hover:text-teal-500">Login here</a>
      </p>

      <div id="msgBox" class="hidden mt-4 p-4 rounded-md border-l-4">
        <p class="text-sm font-medium"></p>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    $(document).ready(function () {
      function showMessage(msg, isSuccess) {
        const box = $('#msgBox');
        box.removeClass('hidden bg-red-50 border-red-400 text-red-700 bg-green-50 border-green-400 text-green-700');
        if (isSuccess) {
          box.addClass('bg-green-50 border-green-400 text-green-700');
        } else {
          box.addClass('bg-red-50 border-red-400 text-red-700');
        }
        box.find('p').text(msg);
        if (isSuccess) {
          setTimeout(() => window.location.href = 'login.html', 2000);
        }
      }

      $('#password').on('input', function () {
        let pass = $(this).val();
        let score = 0;

        // Track reqs
        const hasLength = pass.length >= 8;
        const hasCase = /[A-Z]/.test(pass) && /[a-z]/.test(pass);
        const hasNum = /[0-9]/.test(pass);
        const hasSpec = /[^A-Za-z0-9]/.test(pass);

        if (hasLength) { score++; $('#req-length').removeClass('text-red-500').addClass('text-green-600'); } else $('#req-length').removeClass('text-green-600').addClass('text-red-500');
        if (hasCase) { score++; $('#req-case').removeClass('text-red-500').addClass('text-green-600'); } else $('#req-case').removeClass('text-green-600').addClass('text-red-500');
        if (hasNum) { score++; $('#req-num').removeClass('text-red-500').addClass('text-green-600'); } else $('#req-num').removeClass('text-green-600').addClass('text-red-500');
        if (hasSpec) { score++; $('#req-spec').removeClass('text-red-500').addClass('text-green-600'); } else $('#req-spec').removeClass('text-green-600').addClass('text-red-500');

        const widths = ['0%', '25%', '50%', '75%', '100%'];
        const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-blue-500', 'bg-green-500'];
        const texts = ['None', 'Weak', 'Fair', 'Strong', 'Very Strong'];

        $('#strengthBar').css('width', widths[score]).removeClass().addClass('h-full transition-all ' + colors[score]);
        $('#strengthText').text('Strength: ' + texts[score]);

        // Enable button only if strong
        if (score === 4) {
          $('#submitBtn').prop('disabled', false);
        } else {
          $('#submitBtn').prop('disabled', true);
        }
      });

      $('#signupForm').on('submit', function (e) {
        e.preventDefault();
        $('#msgBox').addClass('hidden');

        const pass = $('#password').val();
        const cpass = $('#cpassword').val();

        if (pass !== cpass) {
          showMessage("Passwords do not match!", false);
          return;
        }

        const data = {
          full_name: $('#name').val(),
          email: $('#email').val(),
          password: pass,
          role: "user"
        };

        const btn = $('#submitBtn');
        const originalText = btn.text();
        btn.text('Registering...').prop('disabled', true);

        Api.call('/api/auth/signup', 'POST', data)
          .done((res) => {
            showMessage("Signup Success! Redirecting to login...", true);
          })
          .fail(function (err) {
            showMessage(err.responseJSON?.message || "Signup failed. Try again.", false);
          })
          .always(() => {
            if ($('#msgBox').hasClass('bg-red-50')) {
              btn.text(originalText).prop('disabled', false);
            }
          });
      });
    });
  </script>
</body>

</html>
